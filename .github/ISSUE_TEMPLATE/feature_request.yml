name: Feature request
description: Suggest an improvement or new capability for Aura
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Feature requests help shape Aura. Be as specific as you can about the problem you are trying to solve.
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: What are you trying to do today that is hard or missing?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like Aura to work?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other apps, workflows, or workarounds you tried (optional)
